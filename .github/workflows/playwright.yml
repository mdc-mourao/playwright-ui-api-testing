name: Playwright Tests

on:
  push:
    branches: [main, master]

  pull_request:
    branches: [main, master]

  workflow_dispatch:
    inputs:
      test_type:
        description: 'What to execute?'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ui-all
          - ui-chromium
          - ui-firefox
          - ui-webkit
          - api

jobs:
  testing:
    timeout-minutes: 100
    runs-on: ubuntu-latest
    env:
      API_URL: ${{ vars.API_URL }}
      API_KEY: ${{ secrets.API_KEY }}
      BASE_URL: ${{ vars.BASE_URL }}
      USER_NAME: ${{ secrets.USER_NAME }}
      PASSWORD: ${{ secrets.PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run API + Chromium (default)
        if: github.event_name != 'workflow_dispatch'
        run: npx playwright test --project="API-Tests" --project="UI-Chromium"
      
      - name: Run all tests
        if: github.event.inputs.test_type == 'all'
        run: npx playwright test

      - name: Run API tests
        if: github.event.inputs.test_type == 'api'
        run: npx playwright test --project="API-Tests"

      - name: Run UI Chromium
        if: github.event.inputs.test_type == 'ui-chromium'
        run: npx playwright test --project="UI-Chromium"

      - name: Run UI Firefox
        if: github.event.inputs.test_type == 'ui-firefox'
        run: npx playwright test --project="UI-Firefox"

      - name: Run UI WebKit
        if: github.event.inputs.test_type == 'ui-webkit'
        run: npx playwright test --project="UI-Webkit"

      - name: Run all UI browsers
        if: github.event.inputs.test_type == 'ui-all'
        run: npx playwright test --project="UI-Chromium" --project="UI-Firefox" --project="UI-Webkit"

      - name: Generate Allure Report
        run: npm run report:generate

      - name: Upload Allure Results (Raw Data)
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          retention-days: 7

      - name: Upload Allure Dashboard (HTML)
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-dashboard
          path: allure-report
          retention-days: 7

      - name: Upload Playwright Trace/Videos (On Failure)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
