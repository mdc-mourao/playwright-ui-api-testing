services:
  playwright:
    image: mcr.microsoft.com/playwright:v1.58.2-jammy
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CI=true
    env_file:
      - .env
    command: >
      sh -c "npm ci && npx playwright test --project='API-Tests' --project='UI-Chromium'"
